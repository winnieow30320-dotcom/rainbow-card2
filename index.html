<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nina's Rainbow Cards</title>
    <style>
        :root { --chakra-color: #333; }
        body { 
            background: #f8f9fa; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: "PingFang TC", "Heiti TC", sans-serif; 
            margin: 0; 
            padding: 20px;
            overflow-x: hidden;
        }

        /* 介紹與規則頁面 (Overlay) */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            transition: opacity 0.8s ease;
        }

        .intro-content { max-width: 500px; }
        .intro-content h2 { color: #555; letter-spacing: 5px; margin-bottom: 20px; }
        .intro-content p { color: #777; line-height: 1.8; margin-bottom: 30px; text-align: left; }
        .rule-list { list-style: none; padding: 0; text-align: left; color: #666; font-size: 0.95rem; }
        .rule-list li { margin-bottom: 12px; display: flex; align-items: flex-start; }
        .rule-list li::before { content: "🌈"; margin-right: 10px; }

        /* 隱藏介紹頁 */
        .hide-intro { opacity: 0; pointer-events: none; }

        h1 { font-size: 1rem; color: #aaa; letter-spacing: 4px; margin-bottom: 30px; font-weight: 300; }

        /* 翻牌容器 */
        .card-container {
            width: 300px;
            height: 420px;
            perspective: 1200px;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 35px;
            box-sizing: border-box;
        }

        .card-front { background: white; border: 1px solid #eee; }
        .card-front::after { content: "Nina's Rainbow"; color: #eee; font-size: 0.8rem; margin-top: 100px; letter-spacing: 2px; }

        .card-back {
            background-color: var(--chakra-color);
            color: white;
            transform: rotateY(180deg);
            transition: background-color 0.5s;
        }

        .text-en { font-size: 0.95rem; opacity: 0.85; margin-bottom: 20px; font-style: italic; line-height: 1.5; }
        .text-zh { font-size: 1.5rem; font-weight: 600; line-height: 1.6; letter-spacing: 1px; }

        #chakra-info {
            max-width: 350px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }
        .chakra-title { 
            font-weight: 600; font-size: 1.1rem; margin-bottom: 10px; 
            color: var(--chakra-color); display: inline-block; padding-bottom: 5px;
            border-bottom: 2px solid var(--chakra-color);
        }
        .chakra-desc { font-size: 0.9rem; line-height: 1.7; color: #666; }

        button {
            padding: 14px 45px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            background: #333;
            color: white;
            border-radius: 50px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        button:hover { background: #000; transform: scale(1.05); }
        
        #startBtn { background: #444; margin-top: 20px; }
    </style>
</head>

            <h2>關於彩虹卡</h2>
            <p>彩虹卡（Rainbow Cards）是來自德國 Doris Wenzel 的創作。這 245 張卡片包含了七種彩虹顏色，對應人體的七大脈輪，每張卡片都提供了一句充滿愛與正向能量的話語，抽到的卡片訊息可以延伸到生活中，嘗試一些對應的實體行動。 此為Ｎina 做來好玩的持續研究升級中 ＾＿＿＾</p>
            
            <ul class="rule-list">
                <li><strong>靜心呼吸：</strong> 抽取前，請閉上眼睛深呼吸三次。</li>
                <li><strong>誠心發問：</strong> 內心可以默想一個問題，或單純祈求今日的指引。</li>
                <li><strong>直覺選擇：</strong> 睜開眼，用直覺點擊卡片翻開訊息。</li>
                <li><strong>落實當下：</strong> 將卡片上的文字帶入今天的日常，感受它的力量。</li>
            </ul>
            
            <button id="startBtn" onclick="startApp()">開始抽卡</button>
        </div>
    </div>

        let isDrawing = false;

        function drawCard() {
            if (isDrawing) return;
            isDrawing = true;

            const cardInner = document.getElementById('cardInner');
            const chakraInfo = document.getElementById('chakra-info');
            
            cardInner.classList.remove('is-flipped');
            chakraInfo.style.opacity = 0;
            chakraInfo.style.transform = "translateY(10px)";

            setTimeout(() => {
                const card = cards[Math.floor(Math.random() * cards.length)];
                const chakra = chakraData[card.color];

                document.getElementById('displayEn').innerText = card.en;
                document.getElementById('displayZh').innerText = card.zh;
                document.getElementById('cardBack').style.backgroundColor = card.color;
                
                document.documentElement.style.setProperty('--chakra-color', card.color);
                document.getElementById('chakraTitle').innerText = chakra.name;
                document.getElementById('chakraDesc').innerText = chakra.desc;

                cardInner.classList.add('is-flipped');
                
                setTimeout(() => {
                    chakraInfo.style.opacity = 1;
                    chakraInfo.style.transform = "translateY(0)";
                    isDrawing = false;
                }, 600);
            }, 350);
        }
